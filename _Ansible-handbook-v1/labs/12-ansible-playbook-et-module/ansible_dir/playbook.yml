#Playbook :

#déclaration qui et où

- name: Je débute avec ansible
  hosts: all
  remote_user: vagrant
  tasks:


# le module ping (pas nécessaire) > ping ssh

- name: je teste ma connexion
  ping:
# Rq : ansible -i inventory all -m ping

#ANSIBLE : Les Modules : ex File


# créer un répertoire

- name: création du répertoire /tmp/pp
  file:
    path: /tmp/pp/
    state: directory
# Rq: user de création > user de connexion


# changement de user > root

- name: création du répertoire /tmp/pp
  file:
    path: /tmp/pp/
    state: directory
    owner: root
# Rq : droit sudo du user vagrant


# become = yes > différents endroits pour le faire
# * cli > -b
# * playbook/tasks > become: yes

- name: création du répertoire /tmp/pp
  file:
    path: /tmp/pp/
    state: directory
    owner: root
  become: yes
# Rq :attention à l'indentation

# ANSIBLE : Les Modules : ex File


# modification du groupe et des droits (RWX-RX-RX - 0755) | stat

- name: création du répertoire /tmp/pp
  file:
    path: /tmp/pp/
    state: directory
    owner: root
    group: root
    mode: 0755
  become: yes


# récursivité (pour directory uniquement

- name: création du répertoire /tmp/pp
  file:
      path: /tmp/pp/1/2/3/4
      recurse: yes
      state: directory
      owner: root
      group: root
      mode: 0755

# touch

- name: création du répertoire /tmp/pp
  file:
      path: /tmp/pp/1/2/3/4/fichier.txt
      state: touch
      owner: root
      group: root
      mode: 0755

# ANSIBLE : Les Modules : ex File


# lien symbolique = lien vers fichier (diff avec hardlink = lien vers inode)

- name: création du répertoire /tmp/pp
  file:
      src: /tmp/pp/1/2/3/4/
      dest: /tmp/symlink
      state: link  #hard
      owner: root
      group: root
      mode: 0755
# Rq: idempotence


# suppression de fichier

- name: dir sans idempotence
  file:
      path: /tmp/pp.txt
      state: absent


# suppression de répertoire récursive

- name: dir sans idempotence
  file:
      path: /tmp/pp/
      state: absent

