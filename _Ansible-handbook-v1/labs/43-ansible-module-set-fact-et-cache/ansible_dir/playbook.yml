- name: module set fact
  hosts: all
  vars:
    var1: "hello"
    var2: "je suis"

  tasks:

  - name: commande
    command: "echo $USER"
    register: __output

  - name: set fact
    set_fact:
      monfact: "{{ var1 }} {{ var2 }}  {{ __output.stdout }}"

  - name: print
    debug:
      var: monfact
