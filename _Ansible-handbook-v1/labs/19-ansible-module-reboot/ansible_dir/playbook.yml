# ANSIBLE : Check & Reboot

# démonstration avec de simples fichiers

- name: mon premier playbook
  hosts: all
  remote_user: vagrant
  become: yes
  tasks:
  - name: create file
    file:
      path: /tmp/pp.txt
      state: touch

  - name: test
    stat:
      path: /tmp/pp.txt
    register: __file_exist

  - name: lancement du reboot avec reboot
    reboot:
      msg: "Reboot via ansible"
      connect_timeout: 5
      reboot_timeout: 300
      pre_reboot_delay: 0
      post_reboot_delay: 30
      test_command: uptime
    when: __file_exist.stat.exists

  - name: file2
    file:
      path: /tmp/pp2.txt
      state: touch

  # ANSIBLE : Check & Reboot


  # exemple d'une mise à jour

  - name: update cache
    apt:
      update_cache: yes
      force_apt_get: yes
      cache_valid_time: 3600

  - name: upgrade général
    apt:
      upgrade: dist
      force_apt_get: yes

  - name: vérification à partir du fichier reboot_required
    register: reboot_required_file
    stat:
      path: /var/run/reboot-required

  - name: lancement du reboot avec reboot
    reboot:
      msg: "Reboot via ansible"
      connect_timeout: 5
      reboot_timeout: 300
      pre_reboot_delay: 0
      post_reboot_delay: 30
      test_command: uptime
    when: reboot_required_file.stat.exists
